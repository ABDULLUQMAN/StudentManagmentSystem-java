<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title style="color:black;">Student Managment System</title>
<style>

body{
font-family: Arial;
background: linear-gradient(to right,#2193b0,#6dd5ed);
margin:0;
padding:0;
}

h1{
text-align:center;
color:white;
padding:20px;
}

.container{

width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px black;

}

input{

width:100%;
padding:10px;
margin:5px 0;
border-radius:5px;
border:1px solid gray;

}

button{

width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
background:blue;
color:white;
font-size:16px;
cursor:pointer;

}

button:hover{

background:darkblue;

}

.section{

margin-bottom:30px;

}

</style>
</head>
<body>
<h1>Student Management System</h1>

<div class="container">


<!-- Registration -->

<div class="section">

<h3>Student Registration</h3>

<form action="register">

<input type="text" name="id" placeholder="Enter ID" required>

<input type="text" name="name" placeholder="Enter Name">

<input type="text" name="course" placeholder="Enter Course">

<button>Register</button>

</form>

</div>



<!-- Update -->

<div class="section">

<h3>Student Update</h3>

<form action="update">

<input type="text" name="id" placeholder="Enter ID">

<input type="text" name="name" placeholder="Enter New Name">

<input type="text" name="course" placeholder="Enter Course">

<button>Update</button>

</form>

</div>



<!-- Delete -->

<div class="section">

<h3>Student Delete</h3>

<form action="delete">

<input type="text" name="id" placeholder="Enter ID">

<button>Delete</button>

</form>

</div>



<!-- Display by ID -->

<div class="section">

<h3>Display Student by ID</h3>

<form action="displayid">

<input type="text" name="id" placeholder="Enter ID">

<button>Search</button>

</form>

</div>



<!-- Display by Name -->

<div class="section">

<h3>Display Student by Name</h3>

<form action="displayname">

<input type="text" name="name" placeholder="Enter Name">

<button>Search</button>

</form>

</div>


</div>

</body>
</html>
